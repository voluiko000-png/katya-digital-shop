<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Katya | Digital Products</title>
<meta name="description" content="Katya Digital Products — цифровые товары: раскраски, паттерны, шаблоны. Магазин прямо в Telegram.">
<meta property="og:title" content="Katya | Digital Products">
<meta property="og:description" content="Цифровые товары: раскраски, паттерны, шаблоны — магазин прямо в Telegram.">
<meta property="og:type" content="website">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --bg:#0e1116; --card:#171b22; --card2:#1d222b;
    --text:#eef1f6; --muted:#8b93a3; --accent:#2f8cff; --accent2:#1e6fe0;
    --radius:18px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;padding-bottom:78px}
  .top{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 8px}
  .brand{display:flex;align-items:center;gap:9px;font-size:20px;font-weight:700}
  .brand .logo{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,#2f8cff,#7b5cff)}
  .menu{color:var(--muted);font-size:15px}
  .banner{margin:10px 18px 6px;height:150px;border-radius:var(--radius);
    background:linear-gradient(100deg,#0b1220 0%,#123 30%,#1a63d6 75%,#2f8cff 100%);
    padding:22px;display:flex;flex-direction:column;justify-content:center;overflow:hidden}
  .banner h2{font-size:26px;font-weight:800;letter-spacing:.3px}
  .banner p{color:#c7d6f5;font-size:13px;margin-top:4px}
  .dots{display:flex;gap:6px;justify-content:center;margin:8px 0 4px}
  .dot{width:7px;height:7px;border-radius:50%;background:#333a46}
  .dot.on{background:var(--accent);width:18px;border-radius:4px}
  .chips{display:flex;gap:8px;overflow-x:auto;padding:6px 16px 4px;-ms-overflow-style:none;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;background:var(--card);color:var(--muted);border:none;font-size:12px;font-weight:600;
    padding:8px 14px;border-radius:20px;cursor:pointer;white-space:nowrap}
  .chip.on{background:var(--accent);color:#fff}
  .sheet{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:flex-end;z-index:50}
  .sheet.show{display:flex}
  .sheet .inner{background:var(--card);width:100%;border-radius:22px 22px 0 0;padding:16px 18px 26px;max-height:86vh;overflow:auto}
  .sheet img{width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:16px}
  .sheet .cat{color:var(--muted);font-size:11px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;margin-top:14px}
  .sheet h3{font-size:21px;font-weight:800;margin:4px 0 8px}
  .sheet p{color:#c3ccda;font-size:14px;line-height:1.5;margin-bottom:16px}
  .sheet .buyrow{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .sheet .price{font-size:24px;font-weight:800}
  .sheet .buybig{flex:1;background:var(--accent);color:#fff;border:none;font-size:16px;font-weight:700;padding:15px;border-radius:14px;cursor:pointer}
  .sheet .close{position:absolute;top:-40px;right:18px;background:var(--card);color:#fff;border:none;width:34px;height:34px;border-radius:50%;font-size:18px;cursor:pointer}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;padding:8px 16px 18px}
  .card{background:var(--card);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column}
  .card .img{width:100%;aspect-ratio:1/1;object-fit:cover;background:var(--card2);display:block}
  .card .body{padding:11px 12px 13px}
  .card .cat{color:var(--muted);font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase}
  .card .name{font-size:14px;font-weight:600;line-height:1.25;margin:3px 0 6px;min-height:34px}
  .card .count{display:inline-block;background:var(--card2);color:var(--muted);font-size:10.5px;font-weight:700;
    padding:3px 8px;border-radius:8px;margin-bottom:8px}
  .sheet .count{display:inline-block;background:var(--card2);color:var(--muted);font-size:12px;font-weight:700;
    padding:4px 10px;border-radius:9px;margin:2px 0 10px}
  .row{display:flex;align-items:center;justify-content:space-between}
  .price{font-size:16px;font-weight:800}
  .buy{background:var(--accent);color:#fff;border:none;font-size:12px;font-weight:700;
    padding:8px 12px;border-radius:11px;cursor:pointer}
  .buy:active{background:var(--accent2)}
  .empty{grid-column:1/-1;color:var(--muted);text-align:center;padding:40px 0;font-size:14px}
  .nav{position:fixed;left:0;right:0;bottom:0;background:rgba(16,19,25,.96);
    border-top:1px solid #1e2430;display:flex;justify-content:space-around;padding:9px 0 14px}
  .nav a{color:var(--muted);font-size:10.5px;text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:4px}
  .nav a.on{color:var(--accent)}
  .nav .ic{font-size:19px}
</style>
</head>
<body>
  <div class="top">
    <div class="brand"><span class="logo"></span>Katya</div>
    <div class="menu">&#9881; Menu</div>
  </div>

  <div class="banner">
    <h2>New Drops Weekly</h2>
    <p>Digital products, AI automations &amp; prompts</p>
  </div>
  <div class="dots"><span class="dot on"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>

  <div class="chips" id="chips">
    <button class="chip on" data-f="all">All</button>
    <button class="chip" data-f="AI Prompts">AI Prompts</button>
    <button class="chip" data-f="Coloring">Coloring</button>
    <button class="chip" data-f="Patterns">Patterns</button>
    <button class="chip" data-f="Notion">Notion</button>
    <button class="chip" data-f="Planners">Planners</button>
    <button class="chip" data-f="Career">Career</button>
    <button class="chip" data-f="SVG Files">SVG Files</button>
    <button class="chip" data-f="Stickers">Stickers</button>
    <button class="chip" data-f="Prints">Prints</button>
    <button class="chip" data-f="Canva">Canva</button>
    <button class="chip" data-f="Fitness">Fitness</button>
    <button class="chip" data-f="Finance">Finance</button>
    <button class="chip" data-f="Wedding">Wedding</button>
    <button class="chip" data-f="Kids">Kids</button>
    <button class="chip" data-f="Recipes">Recipes</button>
    <button class="chip" data-f="Fonts">Fonts</button>
    <button class="chip" data-f="Clipart">Clipart</button>
    <button class="chip" data-f="Presets">Presets</button>
    <button class="chip" data-f="KDP Books">KDP Books</button>
    <button class="chip" data-f="Cartoons">Cartoons</button>
  </div>

  <div class="grid" id="grid"></div>

  <nav class="nav">
    <a class="on"><span class="ic">&#128717;</span>Shop</a>
    <a><span class="ic">&#128194;</span>Categories</a>
    <a><span class="ic">&#129534;</span>Orders</a>
    <a><span class="ic">&#128172;</span>Support</a>
  </nav>

  <div class="sheet" id="sheet">
    <div class="inner">
      <button class="close" onclick="closeSheet()">&times;</button>
      <img id="s-img" src="" alt="">
      <div class="cat" id="s-cat"></div>
      <h3 id="s-name"></h3>
      <div class="count" id="s-count"></div>
      <p id="s-desc">Instant digital download. Ready to use, no waiting — delivered right after purchase. Lifetime access and free updates.</p>
      <div class="buyrow">
        <span class="price" id="s-price"></span>
        <button class="buybig" id="s-buy">Buy Now</button>
      </div>
    </div>
  </div>

<script>
  var tg = window.Telegram && window.Telegram.WebApp;
  if (tg){ try{ tg.ready(); tg.expand(); }catch(e){} }

  var PRODUCTS = [{"id":"p01","img":"covers/p01_titled.jpg","cat":"AI Prompts","name":"Complete AI Prompts Bundle","count":8,"price":"$4.99"},{"id":"p02","img":"covers/p02_titled.jpg","cat":"Coloring","name":"1000+ Printable Coloring Pages Mega Bundle","count":30,"price":"$7.99"},{"id":"p03","img":"covers/p03_titled.jpg","cat":"Patterns","name":"Knitting & Crochet Pattern Bundle","count":12,"price":"$6.99"},{"id":"p04","img":"covers/p04_titled.jpg","cat":"Notion","name":"Notion Templates Mega Bundle","count":12,"price":"$6.99"},{"id":"p05","img":"covers/p05_titled.jpg","cat":"Planners","name":"Digital Planner Bundle","count":12,"price":"$6.99"},{"id":"p06","img":"covers/p06_titled.jpg","cat":"Career","name":"Resume & Career Kit Bundle","count":12,"price":"$6.99"},{"id":"p07","img":"covers/p07_titled.jpg","cat":"SVG Files","name":"SVG & Cricut Files Bundle","count":10,"price":"$5.99"},{"id":"p08","img":"covers/p08_titled.jpg","cat":"Stickers","name":"Digital Stickers Mega Pack","count":14,"price":"$7.99"},{"id":"p09","img":"covers/p09_titled.jpg","cat":"Prints","name":"Wall Art Prints Bundle","count":12,"price":"$6.99"},{"id":"p10","img":"covers/p10_titled.jpg","cat":"Canva","name":"Canva Templates Mega Bundle","count":12,"price":"$6.99"},{"id":"p11","img":"covers/p11_titled.jpg","cat":"Fitness","name":"Fitness & Meal Plan Bundle","count":12,"price":"$6.99"},{"id":"p12","img":"covers/p12_titled.jpg","cat":"Finance","name":"Budget Planner Bundle","count":12,"price":"$6.99"},{"id":"p13","img":"covers/p13_titled.jpg","cat":"Wedding","name":"Wedding Invitations Bundle","count":10,"price":"$5.99"},{"id":"p14","img":"covers/p14_titled.jpg","cat":"Kids","name":"Kids Activity Mega Pack","count":10,"price":"$5.99"},{"id":"p15","img":"covers/p15_titled.jpg","cat":"Recipes","name":"Recipe & Meal Planner Bundle","count":12,"price":"$6.99"},{"id":"p16","img":"covers/p16_titled.jpg","cat":"Fonts","name":"Fonts & Lettering Bundle","count":10,"price":"$5.99"},{"id":"p17","img":"covers/p17_titled.jpg","cat":"Clipart","name":"Clipart & Icons Mega Bundle","count":14,"price":"$7.99"},{"id":"p18","img":"covers/p18_titled.jpg","cat":"Presets","name":"Lightroom Presets Bundle","count":10,"price":"$5.99"},{"id":"p19","img":"covers/p19_titled.jpg","cat":"KDP Books","name":"Low-Content KDP Books Bundle","count":12,"price":"$6.99"},{"id":"p20","img":"covers/p20.jpg","cat":"Cartoons","name":"Kids Cartoon Bundle","count":10,"price":"$5.99"}];

  function escapeHtml(s){
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  var grid = document.getElementById('grid');
  function renderGrid(list){
    if (!list.length){
      grid.innerHTML = '<div class="empty">No products in this category yet.</div>';
      return;
    }
    grid.innerHTML = list.map(function(p, i){
      var loadAttr = i < 8 ? 'loading="eager" fetchpriority="high"' : 'loading="lazy"';
      return '<div class="card" data-id="' + p.id + '">' +
        '<img class="img" ' + loadAttr + ' src="' + p.img + '" alt="">' +
        '<div class="body">' +
          '<div class="cat">' + escapeHtml(p.cat) + '</div>' +
          '<div class="name">' + escapeHtml(p.name) + '</div>' +
          '<div class="count">' + p.count + ' files included</div>' +
          '<div class="row">' +
            '<span class="price">' + escapeHtml(p.price) + '</span>' +
            '<button class="buy" data-buy>Buy</button>' +
          '</div>' +
        '</div>' +
      '</div>';
    }).join('');
  }
  renderGrid(PRODUCTS);

  function order(name, price){
    var msg = "Order: " + name + " - " + price;
    if (tg && tg.sendData){ tg.sendData(msg); }
    else { alert(msg); }
  }

  var sheet = document.getElementById('sheet');
  function openCardById(id){
    var p = PRODUCTS.find(function(x){ return x.id === id; });
    if (!p) return;
    document.getElementById('s-img').src = p.img;
    document.getElementById('s-cat').textContent = p.cat;
    document.getElementById('s-name').textContent = p.name;
    document.getElementById('s-count').textContent = p.count + ' files included';
    document.getElementById('s-price').textContent = p.price;
    document.getElementById('s-buy').onclick = function(){ order(p.name, p.price); };
    sheet.classList.add('show');
  }
  function closeSheet(){ sheet.classList.remove('show'); }
  sheet.addEventListener('click', function(e){ if (e.target === sheet) closeSheet(); });

  grid.addEventListener('click', function(e){
    var card = e.target.closest('.card');
    if (!card) return;
    if (e.target.closest('.buy')){
      var p = PRODUCTS.find(function(x){ return x.id === card.getAttribute('data-id'); });
      if (p) order(p.name, p.price);
      return;
    }
    openCardById(card.getAttribute('data-id'));
  });

  // фильтр по категориям
  var chips = document.querySelectorAll('.chip');
  var currentFilter = 'all';
  function applyFilter(f){
    currentFilter = f;
    renderGrid(f === 'all' ? PRODUCTS : PRODUCTS.filter(function(p){ return p.cat === f; }));
  }
  chips.forEach(function(c){
    c.onclick = function(){
      chips.forEach(function(x){ x.classList.remove('on'); });
      c.classList.add('on');
      applyFilter(c.getAttribute('data-f'));
    };
  });

  // Deep-link: ?cat=Coloring открывает СПИСОК всей категории (человек выбирает сам из многих),
  // а не одну конкретную карточку — в категории может быть 20-50 разных товаров.
  // ?p=05 оставлен как запасной вариант — сразу открывает карточку одного товара.
  (function openFromDeepLink(){
    var params = new URLSearchParams(location.search);
    var cat = params.get('cat') || (tg && tg.initDataUnsafe && tg.initDataUnsafe.start_param);
    if (cat) {
      var chip = Array.prototype.find.call(chips, function(c){ return c.getAttribute('data-f') === cat; });
      if (chip) { chip.click(); chip.scrollIntoView({behavior:'smooth', inline:'center'}); return; }
    }
    var pid = params.get('p') || (location.hash.match(/p=([a-z0-9]+)/i) || [])[1];
    if (!pid) return;
    pid = pid.replace(/^0*/, '').padStart(2, '0');
    openCardById('p' + pid);
  })();
</script>
</body>
</html>
