  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;padding-bottom:78px}
  .top{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 8px}

  .dots{display:flex;gap:6px;justify-content:center;margin:8px 0 4px}
  .dot{width:7px;height:7px;border-radius:50%;background:#333a46}
  .dot.on{background:var(--accent);width:18px;border-radius:4px}

  .sheet{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:flex-end;z-index:50}
  .sheet.show{display:flex}
  .sheet .inner{background:var(--card);width:100%;border-radius:22px 22px 0 0;padding:16px 18px 26px;max-height:86vh;overflow:auto}
  .sheet img{width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:16px}
  .sheet .cat{color:var(--muted);font-size:11px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;margin-top:14px}
  .sheet h3{font-size:21px;font-weight:800;margin:4px 0 8px}
  .sheet p{color:#c3ccda;font-size:14px;line-height:1.5;margin-bottom:16px}
  .sheet .buyrow{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .sheet .price{font-size:24px;font-weight:800}
  .sheet .buybig{flex:1;background:var(--accent);color:#fff;border:none;font-size:16px;font-weight:700;padding:15px;border-radius:14px;cursor:pointer}
  .sheet .close{position:absolute;top:-40px;right:18px;background:var(--card);color:#fff;border:none;width:34px;height:34px;border-radius:50%;font-size:18px;cursor:pointer}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;padding:8px 16px 18px}
  .card{background:var(--card);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column}
  .card .img{width:100%;aspect-ratio:1/1;object-fit:cover;background:var(--card2);display:block}
  .card .body{padding:11px 12px 13px}
  .card .cat{color:var(--muted);font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase}
  .card .name{font-size:14px;font-weight:600;line-height:1.25;margin:3px 0 10px;min-height:34px}
  .row{display:flex;align-items:center;justify-content:space-between}
  .price{font-size:16px;font-weight:800}
  .buy{background:var(--accent);color:#fff;border:none;font-size:12px;font-weight:700;
    padding:8px 12px;border-radius:11px;cursor:pointer}
  .buy:active{background:var(--accent2)}
  .empty{grid-column:1/-1;color:var(--muted);text-align:center;padding:40px 0;font-size:14px}
  .nav{position:fixed;left:0;right:0;bottom:0;background:rgba(16,19,25,.96);
    border-top:1px solid #1e2430;display:flex;justify-content:space-around;padding:9px 0 14px}
  .nav a{color:var(--muted);font-size:10.5px;text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:4px}
  .nav a.on{color:var(--accent)}
  .nav .ic{font-size:19px}

  function escapeHtml(s){
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  var grid = document.getElementById('grid');
  function renderGrid(list){
    if (!list.length){
      grid.innerHTML = '<div class="empty">No products in this category yet.</div>';
      return;
    }
    grid.innerHTML = list.map(function(p, i){
      var loadAttr = i < 8 ? 'loading="eager" fetchpriority="high"' : 'loading="lazy"';
      return '<div class="card" data-id="' + p.id + '">' +
        '<img class="img" ' + loadAttr + ' src="' + p.img + '" alt="">' +
        '<div class="body">' +
          '<div class="cat">' + escapeHtml(p.cat) + '</div>' +
          '<div class="name">' + escapeHtml(p.name) + '</div>' +
          '<div class="row">' +
            '<span class="price">' + escapeHtml(p.price) + '</span>' +
            '<button class="buy" data-buy>Buy</button>' +
          '</div>' +
        '</div>' +
      '</div>';
    }).join('');
  }
  renderGrid(PRODUCTS);

  function order(name, price){
    var msg = "Order: " + name + " - " + price;
    if (tg && tg.sendData){ tg.sendData(msg); }
    else { alert(msg); }
  }

  var sheet = document.getElementById('sheet');
  function openCardById(id){
    var p = PRODUCTS.find(function(x){ return x.id === id; });
    if (!p) return;
    document.getElementById('s-img').src = p.img;
    document.getElementById('s-cat').textContent = p.cat;
    document.getElementById('s-name').textContent = p.name;
    document.getElementById('s-price').textContent = p.price;
    document.getElementById('s-buy').onclick = function(){ order(p.name, p.price); };
    sheet.classList.add('show');
  }
  function closeSheet(){ sheet.classList.remove('show'); }
  sheet.addEventListener('click', function(e){ if (e.target === sheet) closeSheet(); });

  grid.addEventListener('click', function(e){
    var card = e.target.closest('.card');
    if (!card) return;
    if (e.target.closest('.buy')){
      var p = PRODUCTS.find(function(x){ return x.id === card.getAttribute('data-id'); });
      if (p) order(p.name, p.price);
      return;
    }
    openCardById(card.getAttribute('data-id'));
  });

  // фильтр по категориям
  var chips = document.querySelectorAll('.chip');
  var currentFilter = 'all';
  function applyFilter(f){
    currentFilter = f;
    renderGrid(f === 'all' ? PRODUCTS : PRODUCTS.filter(function(p){ return p.cat === f; }));
  }
  chips.forEach(function(c){
    c.onclick = function(){
      chips.forEach(function(x){ x.classList.remove('on'); });
      c.classList.add('on');
      applyFilter(c.getAttribute('data-f'));
    };
  });

  // Deep-link: ?cat=Coloring открывает СПИСОК всей категории (человек выбирает сам из многих),
  // а не одну конкретную карточку — в категории может быть 20-50 разных товаров.
  // ?p=05 оставлен как запасной вариант — сразу открывает карточку одного товара.
  (function openFromDeepLink(){
    var params = new URLSearchParams(location.search);
    var cat = params.get('cat') || (tg && tg.initDataUnsafe && tg.initDataUnsafe.start_param);
    if (cat) {
      var chip = Array.prototype.find.call(chips, function(c){ return c.getAttribute('data-f') === cat; });
      if (chip) { chip.click(); chip.scrollIntoView({behavior:'smooth', inline:'center'}); return; }
    }
    var pid = params.get('p') || (location.hash.match(/p=([a-z0-9]+)/i) || [])[1];
    if (!pid) return;
    pid = pid.replace(/^0*/, '').padStart(2, '0');
    openCardById('p' + pid);
  })();
</script>
